name: Process inbox

on:
  push:
    branches: [main]
    paths:
      - "inbox/**"
  workflow_dispatch: {}

concurrency:
  group: stt-free-process
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync dependencies
        run: uv sync --extra gemini

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Actions 러너에는 로그인된 claude CLI가 없으므로 무료 Gemini 백엔드로 오버라이드
          # (Claude Code 구독/API 과금 없이 완전 자동화하기 위함. https://aistudio.google.com 에서 무료 키 발급)
          STT_FREE_ANALYZE_BACKEND: gemini
          STT_FREE_ANALYZE_MODEL: gemini-1.5-flash
        run: uv run python pipeline/run.py

      - name: Commit results
        run: |
          git config user.name "stt-free-bot"
          git config user.email "actions@users.noreply.github.com"
          git add transcripts/ summaries/ onepagers/ archive/ inbox/
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "pipeline: 음성 처리 결과 자동 생성"
            git push
          fi
